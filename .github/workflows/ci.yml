name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - task-*

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check solution exists
        id: solution
        shell: bash
        run: |
          if [ -f SpaceBattle.sln ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.solution.outputs.exists == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        if: steps.solution.outputs.exists == 'true'
        run: dotnet restore SpaceBattle.sln

      - name: Build
        if: steps.solution.outputs.exists == 'true'
        run: dotnet build SpaceBattle.sln --configuration Release --no-restore

      - name: Test with coverage
        if: steps.solution.outputs.exists == 'true'
        run: >
          dotnet test SpaceBattle.sln --configuration Release --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=../coverage/
          /p:Threshold=90
          /p:ThresholdType=branch
          /p:ThresholdStat=total

      - name: Install ReportGenerator
        if: steps.solution.outputs.exists == 'true'
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        if: steps.solution.outputs.exists == 'true'
        run: >
          reportgenerator
          -reports:coverage/coverage.cobertura.xml
          -targetdir:coverage/report
          -reporttypes:'MarkdownSummaryGithub;JsonSummary;HtmlInline_AzurePipelines'

      - name: Publish coverage comment
        if: steps.solution.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'coverage/report/SummaryGithub.md';
            const summary = fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, 'utf8')
              : 'Coverage summary was not generated.';
            const marker = '<!-- spacebattle-coverage-report -->';
            const body = `${marker}\n## Coverage report\n\n${summary}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const previous = comments.data.find(comment =>
              comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload coverage artifact
        if: steps.solution.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/report
